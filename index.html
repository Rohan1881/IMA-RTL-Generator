<!DOCTYPE html>
<html>
<head>
    <title>IMA RTL Generator</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 50px;
        }
        input {
            width: 60%;
            padding: 10px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            margin-top: 10px;
        }
        pre {
            background: #1e293b;
            padding: 20px;
            margin-top: 20px;
            text-align: left;
        }
    </style>
</head>
<body>

<h1>IMA RTL Generator & Verification</h1>

<form method="POST">
    <input name="text" placeholder="Enter memory specification..."><br>
    <button type="submit">Run Pipeline</button>
</form>

{% if output %}
<div>
    {{ output | safe }}
</div>
{% endif %}

</body>
</html>
